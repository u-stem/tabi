name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - run: bun install --frozen-lockfile

      - name: Biome (lint + format)
        run: bun run check

      - name: TypeScript
        run: bun run check-types

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - run: bun install --frozen-lockfile

      - name: Vitest
        run: bun run test

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit
