name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.2"

      # --ignore-scripts blocks postinstall hooks at install time to defend against supply-chain
      # compromises. For dependabot PRs we drop --frozen-lockfile so bun can rewrite bun.lock
      # (dependabot itself doesn't update bun.lock); a follow-up workflow commits the result.
      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install --ignore-scripts
          else
            bun install --frozen-lockfile --ignore-scripts
          fi

      - name: Biome (lint + format)
        run: bun run check

      - name: TypeScript
        run: bun run check-types

      # Block "critical" advisories explicitly; high is noisy and often transitive, so we
      # surface them without failing the build. bun audit's own exit code behaves
      # inconsistently (exits 1 on any advisory regardless of --level), so we parse output.
      - name: Dependency audit (critical gate)
        run: |
          set +e
          audit_output=$(bun audit 2>&1)
          echo "$audit_output"
          if echo "$audit_output" | grep -qiE '^\s*critical:'; then
            echo "::error::Critical advisory detected, blocking merge"
            exit 1
          fi
          exit 0

      - name: Dependency audit (high, informational)
        run: bun audit
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            bun install --ignore-scripts
          else
            bun install --frozen-lockfile --ignore-scripts
          fi

      - name: Vitest (unit)
        run: bun run test

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Build the sugara_test database and the unprivileged sugara role integration tests use.
      # Using service-port 54322 (mapped to postgres:5432) regardless of the 55322 dev port
      # because the CI postgres instance is isolated from developer machines.
      - name: Provision test database and role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -c "CREATE DATABASE sugara_test;" || true
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'sugara') THEN
                CREATE USER sugara WITH PASSWORD 'sugara';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE sugara_test TO sugara;
            ALTER ROLE sugara BYPASSRLS;
          "
          psql -h 127.0.0.1 -p 54322 -U postgres -d sugara_test -c "
            CREATE SCHEMA IF NOT EXISTS drizzle;
            GRANT ALL ON SCHEMA public TO sugara;
            GRANT ALL ON SCHEMA drizzle TO sugara;
          "

      - name: Apply migrations to sugara_test
        env:
          MIGRATION_URL: postgresql://postgres:postgres@127.0.0.1:54322/sugara_test
        run: bun run --filter @sugara/api db:migrate

      - name: Grant table privileges to sugara role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d sugara_test -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO sugara;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO sugara;
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA drizzle TO sugara;
          "

      - name: Vitest (integration)
        env:
          TEST_DATABASE_URL: postgresql://sugara:sugara@127.0.0.1:54322/sugara_test
        run: bun run --filter @sugara/api test:integration
