name: DB Migrate

# Runs migrations and FAQ seed against production before Vercel rebuilds the app.
# Keeping DB changes separate from `next build` avoids the half-applied state where a build
# failure would leave the schema ahead of the code. Turbo-ignore only skips the web build —
# this workflow always runs so that schema/FAQ changes can't be bypassed by [skip deploy].

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/drizzle/**"
      - "apps/api/src/db/schema.ts"
      - "apps/api/src/db/seed-faqs.ts"
      - "apps/api/src/db/migrate.ts"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch:

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies (no postinstall scripts)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run Drizzle migrations
        env:
          MIGRATION_URL: ${{ secrets.MIGRATION_URL }}
        run: bun run db:migrate

      - name: Seed FAQs (skips when content hash is unchanged)
        env:
          MIGRATION_URL: ${{ secrets.MIGRATION_URL }}
        run: bun run --filter @sugara/api db:seed-faqs
