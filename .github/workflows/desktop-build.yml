name: Desktop Build

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install dependencies
        run: bun install --ignore-scripts

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: 'sugara Desktop v__VERSION__'
          releaseBody: 'デスクトップアプリの新しいバージョンです。Assets からダウンロードしてインストールしてください。'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish:
    needs: [build-tauri]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get tag version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts from private draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo u-stem/sugara \
            --dir dist

      - name: Rewrite latest.json URLs to public repository
        run: |
          if [ -f dist/latest.json ]; then
            sed -i 's|https://github.com/u-stem/sugara/releases/download/|https://github.com/u-stem/sugara-releases/releases/download/|g' dist/latest.json
            cat dist/latest.json
          fi

      - name: Create published release in public repository
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASES_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo u-stem/sugara-releases \
            --title "sugara Desktop ${{ steps.version.outputs.tag }}" \
            --notes "デスクトップアプリの新しいバージョンです。Assets からダウンロードしてインストールしてください。" \
            dist/*

      - name: Delete private draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" \
            --repo u-stem/sugara \
            --yes \
            --cleanup-tag
