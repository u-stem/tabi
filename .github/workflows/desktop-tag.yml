name: Desktop Tag

on:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read current version
        id: version
        run: |
          VERSION=$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="desktop-v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          jq --arg v "$NEW_VERSION" '.version = $v' apps/desktop/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json apps/desktop/src-tauri/tauri.conf.json

          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW_VERSION}\"/" apps/desktop/src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml
          git commit -m "chore: デスクトップアプリ v${NEW_VERSION} にバージョンアップ [skip deploy]"
          git push origin main

      - name: Determine version to tag
        id: final
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        run: |
          TAG="desktop-v${{ steps.final.outputs.version }}"
          git tag "$TAG"
          git push "https://x-access-token:${{ secrets.GH_RELEASES_TOKEN }}@github.com/${{ github.repository }}.git" "$TAG"
