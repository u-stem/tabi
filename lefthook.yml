# Layered hooks: fast local checks for commit, heavier checks for push, full tests in CI only.
# This keeps the common commit loop sub-second while still catching type errors before they
# reach origin/main.

pre-commit:
  parallel: true
  commands:
    # main/master is protected by GitHub Branch Protection — direct push is rejected.
    # Block commits locally so the mistake is caught before the work has to be moved.
    branch-guard:
      run: |
        branch=$(git branch --show-current)
        case "$branch" in
          main|master)
            echo "[branch-guard] $branch への直接コミットは禁止です。'git switch -c <type>/<topic>' で feature branch を作成してください。" >&2
            exit 1
            ;;
        esac
    check:
      run: bun run check
      stage_fixed: true
    check-i18n:
      glob: "apps/web/messages/*.json"
      run: bun run --filter @sugara/web check-i18n

commit-msg:
  commands:
    conventional-commit:
      run: 'grep -qE "^(feat|fix|docs|refactor|test|chore|ci|perf|style|revert)(\(.+\))?: .+" {1} || { echo "Conventional Commits 形式で記述してください: <type>: <説明>"; exit 1; }'

pre-push:
  parallel: true
  commands:
    check-types:
      run: bun run check-types
    audit:
      glob: "bun.lock"
      run: bun audit || echo "[audit] vulnerabilities found (non-blocking)"
